<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e16;
  --surface: #16161f;
  --surface2: #1e1e2a;
  --border: #2c2c3e;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --green: #43e97b;
  --text: #eaeaf5;
  --muted: #6b6b8f;
  --online: #43e97b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif; height:100dvh; display:flex; overflow:hidden; }

/* ── SCREENS ── */
.screen { display:none; width:100%; height:100dvh; }
.screen.active { display:flex; }

/* ── AUTH ── */
#auth-screen { align-items:center; justify-content:center; flex-direction:column; background:var(--bg); }
.auth-card { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:40px 32px; width:320px; text-align:center; }
.brand { font-size:32px; font-weight:800; margin-bottom:4px; }
.brand span { color:var(--accent); }
.brand-sub { color:var(--muted); font-size:13px; margin-bottom:32px; }
.auth-step { display:none; flex-direction:column; gap:12px; }
.auth-step.active { display:flex; }
.auth-title { font-size:16px; font-weight:700; margin-bottom:4px; text-align:left; }
.inp { background:var(--surface2); border:1.5px solid var(--border); border-radius:14px; padding:13px 16px; color:var(--text); font-family:'Nunito',sans-serif; font-size:15px; outline:none; width:100%; transition:border-color .2s; }
.inp::placeholder { color:var(--muted); }
.inp:focus { border-color:var(--accent); }
.btn { background:var(--accent); border:none; border-radius:14px; padding:14px; color:#fff; font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; cursor:pointer; width:100%; transition:opacity .2s,transform .1s; }
.btn:hover { opacity:.9; transform:translateY(-1px); }
.btn.secondary { background:var(--surface2); color:var(--text); }
.err { color:var(--accent2); font-size:12px; min-height:16px; text-align:left; }

/* ── MAIN APP ── */
#app-screen { flex-direction:row; }

/* SIDEBAR */
#sidebar { width:300px; min-width:300px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.sidebar-header { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.my-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; flex-shrink:0; }
.sidebar-title { font-size:18px; font-weight:800; }
.icon-btn { width:36px; height:36px; border-radius:10px; background:var(--surface2); border:none; color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; transition:background .2s; }
.icon-btn:hover { background:var(--border); }
.search-box { padding:10px 16px; border-bottom:1px solid var(--border); }
.search-inp { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:10px 14px; color:var(--text); font-family:'Nunito',sans-serif; font-size:14px; outline:none; width:100%; }
.search-inp::placeholder { color:var(--muted); }
.chat-list { flex:1; overflow-y:auto; }
.chat-item { display:flex; gap:12px; padding:12px 16px; cursor:pointer; transition:background .15s; align-items:center; border-bottom:1px solid rgba(255,255,255,.04); }
.chat-item:hover { background:var(--surface2); }
.chat-item.active { background:rgba(108,99,255,.15); }
.chat-avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; flex-shrink:0; }
.chat-info { flex:1; min-width:0; }
.chat-name { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-last { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.chat-badge { background:var(--accent); color:#fff; border-radius:10px; font-size:11px; font-weight:700; padding:2px 7px; }
.sidebar-empty { text-align:center; color:var(--muted); font-size:13px; padding:40px 20px; }

/* CHAT AREA */
#chat-area { flex:1; display:flex; flex-direction:column; min-width:0; }
#chat-placeholder { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; color:var(--muted); }
#chat-placeholder .ph-icon { font-size:48px; opacity:.3; }
#chat-view { flex:1; display:none; flex-direction:column; }
.chat-header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
.chat-header-info { flex:1; }
.chat-header-name { font-size:15px; font-weight:700; }
.chat-header-sub { font-size:12px; color:var(--muted); }
.back-btn { display:none; }
#msg-list { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:6px; }
#msg-list::-webkit-scrollbar { width:4px; }
#msg-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.msg-row { display:flex; gap:8px; animation:pop .2s ease; }
@keyframes pop { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }
.msg-row.own { flex-direction:row-reverse; }
.msg-av { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; flex-shrink:0; align-self:flex-end; }
.msg-bubble { max-width:68%; background:var(--surface2); border-radius:18px 18px 18px 4px; padding:10px 14px; }
.msg-row.own .msg-bubble { background:linear-gradient(135deg,var(--accent),#8b5cf6); border-radius:18px 18px 4px 18px; }
.msg-sender { font-size:11px; font-weight:700; margin-bottom:3px; }
.msg-text { font-size:14px; line-height:1.5; word-break:break-word; }
.msg-time { font-size:10px; color:rgba(255,255,255,.4); margin-top:4px; text-align:right; }
.msg-row.own .msg-time { color:rgba(255,255,255,.6); }
.system-msg { text-align:center; color:var(--muted); font-size:12px; padding:6px 0; }
.chat-input-bar { background:var(--surface); border-top:1px solid var(--border); padding:12px 16px; display:flex; gap:10px; align-items:flex-end; flex-shrink:0; }
.msg-textarea { flex:1; background:var(--surface2); border:1.5px solid var(--border); border-radius:16px; padding:11px 16px; color:var(--text); font-family:'Nunito',sans-serif; font-size:14px; outline:none; resize:none; max-height:100px; line-height:1.5; transition:border-color .2s; }
.msg-textarea:focus { border-color:var(--accent); }
.msg-textarea::placeholder { color:var(--muted); }
.send-btn { width:42px; height:42px; background:var(--accent); border:none; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform .1s; }
.send-btn:hover { transform:scale(1.05); }
.send-btn svg { width:18px; height:18px; fill:white; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:200; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px 24px; width:320px; }
.modal-title { font-size:16px; font-weight:800; margin-bottom:20px; }
.modal-actions { display:flex; gap:10px; margin-top:16px; }
.modal-actions .btn { flex:1; }

/* COLORS */
.c0{background:#6c63ff} .c1{background:#ff6584} .c2{background:#43e97b;color:#0e0e16!important}
.c3{background:#f7c948;color:#0e0e16!important} .c4{background:#38bdf8} .c5{background:#f472b6}
.c6{background:#34d399;color:#0e0e16!important} .c7{background:#fb923c}

@media(max-width:600px) {
  #sidebar { width:100%; min-width:100%; position:absolute; z-index:10; height:100dvh; transition:transform .3s; }
  #sidebar.hidden { transform:translateX(-100%); }
  .back-btn { display:flex !important; }
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="screen active">
  <div class="auth-card">
    <div class="brand">Panda<span>Chat</span></div>
    <div class="brand-sub">Мессенджер нового поколения 🐼</div>

    <!-- Step 1: Phone -->
    <div class="auth-step active" id="step-phone">
      <div class="auth-title">Введи номер телефона</div>
      <input class="inp" id="phone-inp" placeholder="+998 90 000 00 00" type="tel">
      <div class="err" id="phone-err"></div>
      <button class="btn" onclick="checkPhone()">Продолжить →</button>
    </div>

    <!-- Step 2: Register -->
    <div class="auth-step" id="step-register">
      <div class="auth-title">Создать аккаунт</div>
      <input class="inp" id="username-inp" placeholder="Твой никнейм" maxlength="20">
      <div class="err" id="reg-err"></div>
      <button class="btn" onclick="register()">Зарегистрироваться</button>
      <button class="btn secondary" onclick="showStep('phone')">← Назад</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="my-avatar c0" id="my-avatar-el">?</div>
        <div>
          <div style="font-size:14px;font-weight:700" id="my-name-el">—</div>
          <div style="font-size:11px;color:var(--muted)" id="my-phone-el">—</div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="icon-btn" onclick="openNewChat()" title="Новый чат">✉️</button>
        <button class="icon-btn" onclick="openNewGroup()" title="Новая группа">👥</button>
      </div>
    </div>
    <div class="search-box">
      <input class="search-inp" placeholder="🔍 Поиск чатов..." oninput="filterChats(this.value)">
    </div>
    <div class="chat-list" id="chat-list">
      <div class="sidebar-empty">Нет чатов.<br>Нажми ✉️ чтобы начать</div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div id="chat-area">
    <div id="chat-placeholder">
      <div class="ph-icon">💬</div>
      <div>Выбери чат или начни новый</div>
    </div>
    <div id="chat-view">
      <div class="chat-header">
        <button class="icon-btn back-btn" onclick="backToSidebar()">←</button>
        <div class="chat-avatar c0" id="cv-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="cv-name">—</div>
          <div class="chat-header-sub" id="cv-sub">—</div>
        </div>
      </div>
      <div id="msg-list"></div>
      <div class="chat-input-bar">
        <textarea class="msg-textarea" id="msg-inp" placeholder="Сообщение..." rows="1" maxlength="1000"></textarea>
        <button class="send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: New Chat -->
<div class="modal-overlay" id="modal-chat">
  <div class="modal">
    <div class="modal-title">💬 Новый личный чат</div>
    <input class="inp" id="search-user-inp" placeholder="Никнейм или телефон пользователя" oninput="searchUser(this.value)">
    <div id="user-search-results" style="margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto"></div>
    <div class="err" id="chat-err"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal('modal-chat')">Отмена</button>
    </div>
  </div>
</div>

<!-- MODAL: New Group -->
<div class="modal-overlay" id="modal-group">
  <div class="modal">
    <div class="modal-title">👥 Создать группу</div>
    <input class="inp" id="group-name-inp" placeholder="Название группы" style="margin-bottom:10px">
    <input class="inp" id="group-user-inp" placeholder="Добавить участника (никнейм)" oninput="searchGroupUser(this.value)">
    <div id="group-search-results" style="margin-top:8px;display:flex;flex-direction:column;gap:6px;max-height:120px;overflow-y:auto"></div>
    <div id="group-members-list" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px"></div>
    <div class="err" id="group-err"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal('modal-group')">Отмена</button>
      <button class="btn" onclick="createGroup()">Создать</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://zhetspshspxioffqzuyy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoZXRzcHNoc3B4aW9mZnF6dXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDUwMzIsImV4cCI6MjA5NTk4MTAzMn0.H-Nfk5ZvSZFT9JFma3H5W5Yj6DxDcU3-56RFn0S_-NQ';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const COLORS = ['c0','c1','c2','c3','c4','c5','c6','c7'];
function colorFor(str) { let h=0; for(let c of str) h=Math.imul(31,h)+c.charCodeAt(0)|0; return COLORS[Math.abs(h)%8]; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }

let ME = null;
let currentChatId = null;
let allChats = [];
let groupMembers = [];
let realtimeSub = null;

// ── AUTH ──
function showStep(name) {
  document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
  document.getElementById('step-'+name).classList.add('active');
}

async function checkPhone() {
  const phone = document.getElementById('phone-inp').value.trim();
  if (!phone) { document.getElementById('phone-err').textContent = 'Введи номер'; return; }
  document.getElementById('phone-err').textContent = '';
  const { data } = await db.from('users').select('*').eq('phone', phone).single();
  if (data) {
    ME = data;
    enterApp();
  } else {
    document.getElementById('step-phone').classList.remove('active');
    showStep('register');
  }
}

async function register() {
  const phone = document.getElementById('phone-inp').value.trim();
  const username = document.getElementById('username-inp').value.trim();
  if (!username) { document.getElementById('reg-err').textContent = 'Введи никнейм'; return; }
  document.getElementById('reg-err').textContent = '';
  const color = colorFor(username);
  const { data, error } = await db.from('users').insert({ username, phone, avatar_color: color }).select().single();
  if (error) { document.getElementById('reg-err').textContent = 'Никнейм занят, попробуй другой'; return; }
  ME = data;
  enterApp();
}

function enterApp() {
  document.getElementById('auth-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  document.getElementById('my-name-el').textContent = '@' + ME.username;
  document.getElementById('my-phone-el').textContent = ME.phone;
  const av = document.getElementById('my-avatar-el');
  av.textContent = ME.username[0].toUpperCase();
  av.className = 'my-avatar ' + (ME.avatar_color || colorFor(ME.username));
  loadChats();
  subscribeToNewMessages();
}

// ── CHATS ──
async function loadChats() {
  const { data: memberships } = await db.from('chat_members').select('chat_id').eq('user_id', ME.id);
  if (!memberships || memberships.length === 0) { renderChatList([]); return; }
  const chatIds = memberships.map(m => m.chat_id);
  const { data: chats } = await db.from('chats').select('*').in('id', chatIds).order('created_at', {ascending:false});
  allChats = chats || [];
  renderChatList(allChats);
}

function renderChatList(chats) {
  const el = document.getElementById('chat-list');
  if (!chats.length) { el.innerHTML = '<div class="sidebar-empty">Нет чатов.<br>Нажми ✉️ чтобы начать</div>'; return; }
  el.innerHTML = chats.map(c => {
    const color = colorFor(c.name || c.id);
    const icon = c.is_group ? '👥' : c.name[0].toUpperCase();
    return `<div class="chat-item${currentChatId===c.id?' active':''}" onclick="openChat('${c.id}')">
      <div class="chat-avatar ${color}">${icon}</div>
      <div class="chat-info">
        <div class="chat-name">${esc(c.name)}</div>
        <div class="chat-last">${c.is_group ? 'Группа' : 'Личный чат'}</div>
      </div>
    </div>`;
  }).join('');
}

function filterChats(q) {
  const filtered = allChats.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
  renderChatList(filtered);
}

// ── OPEN CHAT ──
async function openChat(chatId) {
  currentChatId = chatId;
  const chat = allChats.find(c => c.id === chatId);
  if (!chat) return;

  // Update sidebar active
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.chat-item').forEach(el => {
    if (el.onclick.toString().includes(chatId)) el.classList.add('active');
  });

  // Show chat view
  document.getElementById('chat-placeholder').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.style.display = 'flex';

  const color = colorFor(chat.name || chat.id);
  const av = document.getElementById('cv-avatar');
  av.textContent = chat.is_group ? '👥' : chat.name[0].toUpperCase();
  av.className = 'chat-avatar ' + color;
  document.getElementById('cv-name').textContent = chat.name;
  document.getElementById('cv-sub').textContent = chat.is_group ? 'Группа' : 'Личный чат';

  // Mobile: hide sidebar
  if (window.innerWidth <= 600) {
    document.getElementById('sidebar').classList.add('hidden');
  }

  // Load messages
  const msgList = document.getElementById('msg-list');
  msgList.innerHTML = '';
  const { data: msgs } = await db.from('messages').select('*').eq('chat_id', chatId).order('created_at', {ascending:true}).limit(100);
  (msgs || []).forEach(m => appendMsg(m));
  msgList.scrollTop = msgList.scrollHeight;

  // Realtime
  if (realtimeSub) db.removeChannel(realtimeSub);
  realtimeSub = db.channel('chat-' + chatId)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`chat_id=eq.${chatId}` }, p => {
      appendMsg(p.new);
      msgList.scrollTop = msgList.scrollHeight;
    }).subscribe();
}

function appendMsg(m) {
  const list = document.getElementById('msg-list');
  const isOwn = m.user_id === ME.id;
  const color = m.avatar_color || colorFor(m.username || '?');
  const div = document.createElement('div');
  div.className = 'msg-row' + (isOwn ? ' own' : '');
  div.innerHTML = `
    ${!isOwn ? `<div class="msg-av ${color}">${(m.username||'?')[0].toUpperCase()}</div>` : ''}
    <div class="msg-bubble">
      ${!isOwn ? `<div class="msg-sender" style="color:${colorToCss(color)}">${esc(m.username||'')}</div>` : ''}
      <div class="msg-text">${esc(m.text)}</div>
      <div class="msg-time">${fmtTime(m.created_at)}</div>
    </div>
    ${isOwn ? `<div class="msg-av ${color}">${(m.username||'?')[0].toUpperCase()}</div>` : ''}`;
  list.appendChild(div);
}

function colorToCss(c) {
  const map = {c0:'#6c63ff',c1:'#ff6584',c2:'#43e97b',c3:'#f7c948',c4:'#38bdf8',c5:'#f472b6',c6:'#34d399',c7:'#fb923c'};
  return map[c] || '#6c63ff';
}

async function sendMsg() {
  const inp = document.getElementById('msg-inp');
  const text = inp.value.trim();
  if (!text || !currentChatId) return;
  inp.value = ''; inp.style.height = 'auto';
  await db.from('messages').insert({
    chat_id: currentChatId, user_id: ME.id,
    username: ME.username, text,
    avatar_color: ME.avatar_color || colorFor(ME.username)
  });
}

// ── NEW CHAT ──
function openNewChat() { document.getElementById('modal-chat').classList.add('open'); document.getElementById('search-user-inp').value = ''; document.getElementById('user-search-results').innerHTML = ''; }

let searchTimer;
function searchUser(q) {
  clearTimeout(searchTimer);
  if (!q) { document.getElementById('user-search-results').innerHTML = ''; return; }
  searchTimer = setTimeout(async () => {
    const { data } = await db.from('users').select('*').or(`username.ilike.%${q}%,phone.ilike.%${q}%`).neq('id', ME.id).limit(5);
    const el = document.getElementById('user-search-results');
    if (!data || !data.length) { el.innerHTML = '<div style="color:var(--muted);font-size:13px">Не найдено</div>'; return; }
    el.innerHTML = data.map(u => `<div onclick="startDM('${u.id}','${esc(u.username)}')" style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:10px;cursor:pointer">
      <div class="chat-avatar ${u.avatar_color||colorFor(u.username)}" style="width:34px;height:34px;font-size:14px">${u.username[0].toUpperCase()}</div>
      <div><div style="font-size:14px;font-weight:700">@${esc(u.username)}</div><div style="font-size:11px;color:var(--muted)">${esc(u.phone)}</div></div>
    </div>`).join('');
  }, 300);
}

async function startDM(userId, username) {
  closeModal('modal-chat');
  // Check if DM already exists
  const { data: myChats } = await db.from('chat_members').select('chat_id').eq('user_id', ME.id);
  const { data: theirChats } = await db.from('chat_members').select('chat_id').eq('user_id', userId);
  const myChatIds = (myChats||[]).map(m=>m.chat_id);
  const theirChatIds = (theirChats||[]).map(m=>m.chat_id);
  const common = myChatIds.filter(id => theirChatIds.includes(id));
  if (common.length) {
    const { data: existing } = await db.from('chats').select('*').in('id', common).eq('is_group', false).single();
    if (existing) { if (!allChats.find(c=>c.id===existing.id)) allChats.unshift(existing); renderChatList(allChats); openChat(existing.id); return; }
  }
  // Create new DM
  const { data: chat } = await db.from('chats').insert({ name: username, is_group: false, created_by: ME.id }).select().single();
  await db.from('chat_members').insert([{ chat_id: chat.id, user_id: ME.id }, { chat_id: chat.id, user_id: userId }]);
  allChats.unshift(chat);
  renderChatList(allChats);
  openChat(chat.id);
}

// ── NEW GROUP ──
function openNewGroup() { groupMembers = []; document.getElementById('modal-group').classList.add('open'); document.getElementById('group-name-inp').value = ''; document.getElementById('group-user-inp').value = ''; document.getElementById('group-search-results').innerHTML = ''; document.getElementById('group-members-list').innerHTML = ''; }

function searchGroupUser(q) {
  clearTimeout(searchTimer);
  if (!q) { document.getElementById('group-search-results').innerHTML = ''; return; }
  searchTimer = setTimeout(async () => {
    const { data } = await db.from('users').select('*').ilike('username', `%${q}%`).neq('id', ME.id).limit(5);
    const el = document.getElementById('group-search-results');
    if (!data || !data.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px">Не найдено</div>'; return; }
    el.innerHTML = data.map(u => `<div onclick="addGroupMember('${u.id}','${esc(u.username)}','${u.avatar_color||colorFor(u.username)}')" style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border-radius:10px;cursor:pointer">
      <div class="chat-avatar ${u.avatar_color||colorFor(u.username)}" style="width:28px;height:28px;font-size:12px">${u.username[0].toUpperCase()}</div>
      <div style="font-size:13px;font-weight:600">@${esc(u.username)}</div>
    </div>`).join('');
  }, 300);
}

function addGroupMember(id, username, color) {
  if (groupMembers.find(m=>m.id===id)) return;
  groupMembers.push({id, username, color});
  document.getElementById('group-user-inp').value = '';
  document.getElementById('group-search-results').innerHTML = '';
  renderGroupMembers();
}

function removeGroupMember(id) {
  groupMembers = groupMembers.filter(m=>m.id!==id);
  renderGroupMembers();
}

function renderGroupMembers() {
  document.getElementById('group-members-list').innerHTML = groupMembers.map(m =>
    `<div style="display:flex;align-items:center;gap:4px;background:var(--surface2);border-radius:8px;padding:4px 8px;font-size:12px">
      @${esc(m.username)} <span onclick="removeGroupMember('${m.id}')" style="cursor:pointer;color:var(--accent2);margin-left:2px">✕</span>
    </div>`).join('');
}

async function createGroup() {
  const name = document.getElementById('group-name-inp').value.trim();
  if (!name) { document.getElementById('group-err').textContent = 'Введи название'; return; }
  if (groupMembers.length === 0) { document.getElementById('group-err').textContent = 'Добавь участников'; return; }
  document.getElementById('group-err').textContent = '';
  const { data: chat } = await db.from('chats').insert({ name, is_group: true, created_by: ME.id }).select().single();
  const members = [{ chat_id: chat.id, user_id: ME.id }, ...groupMembers.map(m => ({ chat_id: chat.id, user_id: m.id }))];
  await db.from('chat_members').insert(members);
  // Welcome message
  await db.from('messages').insert({ chat_id: chat.id, user_id: ME.id, username: ME.username, text: `Группа "${name}" создана! 🎉`, avatar_color: ME.avatar_color });
  allChats.unshift(chat);
  renderChatList(allChats);
  closeModal('modal-group');
  openChat(chat.id);
}

// ── REALTIME for new chats ──
function subscribeToNewMessages() {
  db.channel('global-messages')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, async p => {
      if (p.new.chat_id !== currentChatId) {
        // Reload chats to update
        if (!allChats.find(c=>c.id===p.new.chat_id)) await loadChats();
      }
    }).subscribe();
}

// ── UTILS ──
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function backToSidebar() { document.getElementById('sidebar').classList.remove('hidden'); }

document.getElementById('msg-inp').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById('msg-inp').addEventListener('input', function() {
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px';
});
document.getElementById('phone-inp').addEventListener('keydown', e => { if(e.key==='Enter') checkPhone(); });
document.getElementById('username-inp').addEventListener('keydown', e => { if(e.key==='Enter') register(); });

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('open'); });
});
</script>
